<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MATE — Demo ugrađenog wizarda</title>
  <style>
    body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; margin: 0; background: #f1f5f9; color: #0f172a; }
    .hero { max-width: 860px; margin: 0 auto; padding: 48px 20px 16px; text-align: center; }
    .hero h1 { font-size: 2rem; margin: 0 0 8px; }
    .hero p { color: #475569; margin: 0 auto; max-width: 560px; }
    .wrap { max-width: 860px; margin: 0 auto 60px; padding: 0 20px; }
    .card { background: #fff; border-radius: 16px; box-shadow: 0 10px 30px rgba(2,6,23,0.08); overflow: hidden; }
    .note { max-width: 860px; margin: 0 auto 40px; padding: 0 20px; color: #64748b; font-size: 0.85rem; }
    code { background: #e2e8f0; padding: 1px 5px; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="hero">
    <h1>Napravite svog AI agenta</h1>
    <p>Ova stranica simulira vaš marketing sajt. Wizard ispod je ubačen jednim <code>&lt;script&gt;</code> tagom.</p>
  </div>

  <div class="wrap">
    <div class="card">
      <!-- Wizard se renderuje ovde -->
      <div id="mate-wizard"></div>
    </div>
  </div>

  <div class="note">
    Ugrađeno preko:
    <code>&lt;script src=".../wizard/mate-wizard.js" data-server="..." data-target="mate-wizard"&gt;&lt;/script&gt;</code>
  </div>

  <!-- Embeddable loader: prilagodi data-server ako ti je MATE na drugom hostu/portu -->
  <script
    src="http://localhost:8000/wizard/mate-wizard.js"
    data-server="http://localhost:8000"
    data-target="mate-wizard"
    data-lang="sr"
    data-contact-email="prodaja@tvojafirma.rs"
    data-height="760"></script>
</body>
</html>
