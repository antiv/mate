{% extends "base.html" %}

{% block title %}Shop Orders - MATE{% endblock %}

{% block content %}
<div class="space-y-4">
    <div class="flex flex-col gap-3 sm:flex-row sm:justify-between sm:items-center">
        <div class="min-w-0">
            <h2 class="text-xl font-bold text-gray-900 dark:text-white">Shop Orders</h2>
            <p class="text-sm text-gray-600 dark:text-gray-400 mt-1">
                Orders placed through the e-commerce agent, grouped by partner. Follow up to confirm and fulfill.
            </p>
        </div>
        <div class="flex flex-wrap gap-2 items-center flex-shrink-0">
            <input type="text" id="searchInput" placeholder="Search order #, name, email…"
                   class="px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg w-56">
            <select id="filterPartner" onchange="loadOrders()" class="px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg">
                <option value="">All partners</option>
            </select>
            <select id="filterStatus" onchange="loadOrders()" class="px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg">
                <option value="">All statuses</option>
                <option value="new">New</option>
                <option value="contacted">Contacted</option>
                <option value="fulfilled">Fulfilled</option>
                <option value="cancelled">Cancelled</option>
            </select>
            <button type="button" onclick="loadOrders()" class="px-3 py-2 text-xs bg-blue-600 hover:bg-blue-700 text-white rounded-lg flex items-center min-h-[44px] touch-target">
                <i class="fas fa-sync-alt mr-1"></i>Refresh
            </button>
        </div>
    </div>

    <div id="ordersContainer" class="space-y-6">
        <p class="text-center text-gray-400 py-6">Loading…</p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function esc(s) {
    return String(s == null ? "" : s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

function fmtDate(iso) {
    if (!iso) return "—";
    try { return new Date(iso).toLocaleString(); } catch (e) { return iso; }
}

function fmtMoney(total, currency) {
    if (total == null) return "—";
    return total + " " + (currency || "");
}

const STATUS_BADGE = {
    new: "bg-blue-100 text-blue-700",
    contacted: "bg-amber-100 text-amber-700",
    fulfilled: "bg-green-100 text-green-700",
    cancelled: "bg-gray-100 text-gray-500",
};

let PARTNER_NAMES = {};

function loadPartnersFilter() {
    return fetch("/dashboard/api/wizard/partners")
        .then(r => r.json())
        .then(d => {
            const sel = document.getElementById("filterPartner");
            (d.partners || []).forEach(p => {
                PARTNER_NAMES[p.partner_key] = p.name || p.partner_key;
                const o = document.createElement("option");
                o.value = p.partner_key; o.textContent = (p.name || p.partner_key);
                sel.appendChild(o);
            });
        })
        .catch(() => {});
}

function loadOrders() {
    const status = document.getElementById("filterStatus").value;
    const partner = document.getElementById("filterPartner").value;
    const search = document.getElementById("searchInput").value.trim();
    const params = [];
    if (status) params.push("status=" + encodeURIComponent(status));
    if (partner) params.push("partner=" + encodeURIComponent(partner));
    if (search) params.push("search=" + encodeURIComponent(search));
    const url = "/dashboard/api/shop/orders" + (params.length ? "?" + params.join("&") : "");
    fetch(url)
        .then(r => r.json())
        .then(d => renderOrders(d.orders || []))
        .catch(() => {
            document.getElementById("ordersContainer").innerHTML =
                '<p class="text-center text-red-500 py-6">Failed to load orders.</p>';
        });
}

let _searchTimer = null;
function onSearchInput() {
    clearTimeout(_searchTimer);
    _searchTimer = setTimeout(loadOrders, 300);
}

let ORDERS = [];

function itemsSummary(items) {
    if (!items || !items.length) return "—";
    return items.map(function (it) {
        return esc(it.name) + " × " + it.quantity;
    }).join(", ");
}

function renderOrders(orders) {
    ORDERS = orders;
    const container = document.getElementById("ordersContainer");
    if (!orders.length) {
        container.innerHTML = '<p class="text-center text-gray-400 py-6">No orders yet.</p>';
        return;
    }

    // Group by partner_key
    const groups = {};
    orders.forEach(function (o) {
        const key = o.partner_key || "__none__";
        (groups[key] = groups[key] || []).push(o);
    });

    const keys = Object.keys(groups).sort(function (a, b) {
        if (a === "__none__") return 1;
        if (b === "__none__") return -1;
        return a.localeCompare(b);
    });

    container.innerHTML = keys.map(function (key) {
        const list = groups[key];
        const partnerLabel = key === "__none__"
            ? "No partner"
            : (PARTNER_NAMES[key] || key);
        const total = list.reduce(function (sum, o) { return sum + (o.total || 0); }, 0);
        const currency = (list[0] && list[0].currency) || "";

        const rows = list.map(function (o) {
            const opts = ["new", "contacted", "fulfilled", "cancelled"].map(function (s) {
                return '<option value="' + s + '"' + (s === o.status ? " selected" : "") + '>' + s + '</option>';
            }).join("");
            const badge = STATUS_BADGE[o.status] || "bg-gray-100 text-gray-500";
            const deleteBtn = '<button onclick="deleteOrder(' + o.id + ')" class="text-red-500 hover:text-red-700 text-xs" title="Delete order"><i class="fas fa-trash"></i></button>';
            const noteCell = o.note ? '<div class="text-xs text-gray-400 dark:text-gray-500 mt-0.5">' + esc(o.note) + '</div>' : '';
            const customer =
                '<div class="font-medium text-gray-900 dark:text-white">' + esc(o.customer_name || "—") + '</div>' +
                '<div class="text-xs text-gray-500 dark:text-gray-400"><a class="hover:underline" href="mailto:' + esc(o.customer_email) + '">' + esc(o.customer_email) + '</a></div>';
            return '<tr>' +
                '<td class="px-4 py-2 whitespace-nowrap text-gray-500 dark:text-gray-400">' + esc(fmtDate(o.created_at)) + '</td>' +
                '<td class="px-4 py-2 whitespace-nowrap font-mono text-xs text-gray-700 dark:text-gray-300">' + esc(o.order_id) + '</td>' +
                '<td class="px-4 py-2">' + customer + '</td>' +
                '<td class="px-4 py-2 text-gray-700 dark:text-gray-300">' + itemsSummary(o.items) + noteCell + '</td>' +
                '<td class="px-4 py-2 whitespace-nowrap font-medium text-gray-900 dark:text-white">' + esc(fmtMoney(o.total, o.currency)) + '</td>' +
                '<td class="px-4 py-2 whitespace-nowrap">' +
                    '<span class="inline-block px-2 py-0.5 rounded-full text-xs ' + badge + '">' + esc(o.status) + '</span>' +
                '</td>' +
                '<td class="px-4 py-2 whitespace-nowrap">' +
                    '<select onchange="updateStatus(' + o.id + ', this.value)" class="text-xs border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded px-2 py-1">' + opts + '</select>' +
                '</td>' +
                '<td class="px-4 py-2 whitespace-nowrap">' + deleteBtn + '</td>' +
                '</tr>';
        }).join("");

        return '' +
            '<div class="bg-white dark:bg-gray-800 rounded-lg shadow overflow-hidden">' +
                '<div class="flex items-center justify-between px-4 py-3 border-b border-gray-100 dark:border-gray-700">' +
                    '<h3 class="font-semibold text-gray-900 dark:text-white">' +
                        '<i class="fas fa-store mr-2 text-gray-400"></i>' + esc(partnerLabel) +
                        '<span class="ml-2 text-xs font-normal text-gray-400">' + list.length + ' order' + (list.length === 1 ? '' : 's') + '</span>' +
                    '</h3>' +
                    '<span class="text-sm text-gray-500 dark:text-gray-400">Total: <span class="font-medium text-gray-900 dark:text-white">' + esc(Math.round(total * 100) / 100) + ' ' + esc(currency) + '</span></span>' +
                '</div>' +
                '<div class="overflow-x-auto"><table class="min-w-full text-sm">' +
                    '<thead class="bg-gray-50 dark:bg-gray-700/50 text-gray-600 dark:text-gray-300"><tr>' +
                        '<th class="text-left px-4 py-2 font-medium">Created</th>' +
                        '<th class="text-left px-4 py-2 font-medium">Order #</th>' +
                        '<th class="text-left px-4 py-2 font-medium">Customer</th>' +
                        '<th class="text-left px-4 py-2 font-medium">Items</th>' +
                        '<th class="text-left px-4 py-2 font-medium">Total</th>' +
                        '<th class="text-left px-4 py-2 font-medium">Status</th>' +
                        '<th class="text-left px-4 py-2 font-medium"></th>' +
                        '<th class="text-left px-4 py-2 font-medium"></th>' +
                    '</tr></thead>' +
                    '<tbody class="divide-y divide-gray-100 dark:divide-gray-700">' + rows + '</tbody>' +
                '</table></div>' +
            '</div>';
    }).join("");
}

function updateStatus(id, status) {
    fetch("/dashboard/api/shop/orders/" + id, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ status: status }),
    })
        .then(r => { if (!r.ok) throw new Error(); return r.json(); })
        .then(() => loadOrders())
        .catch(() => alert("Could not update status"));
}

function deleteOrder(id) {
    if (!confirm("Delete this order? This cannot be undone.")) return;
    fetch("/dashboard/api/shop/orders/" + id, { method: "DELETE" })
        .then(r => r.json().then(d => { if (!r.ok) throw new Error(d.detail || "Failed"); return d; }))
        .then(() => loadOrders())
        .catch(e => alert("Delete failed: " + e.message));
}

document.addEventListener("DOMContentLoaded", function () {
    document.getElementById("searchInput").addEventListener("input", onSearchInput);
    loadPartnersFilter().then(loadOrders);
});
</script>
{% endblock %}
