<!-- Edit Instruction Modal -->
<div id="editInstructionModal" class="hidden fixed inset-0 z-[130] flex items-center justify-center">
    <div id="editInstructionModalBackdrop" class="absolute inset-0 bg-black/40 dark:bg-black/60"></div>
    <div class="relative w-full max-w-4xl bg-white dark:bg-gray-900 rounded-lg shadow-2xl border border-gray-200 dark:border-gray-700 flex flex-col max-h-[90vh]">
        <div class="px-4 py-3 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
            <div>
                <h4 class="text-sm font-semibold text-gray-900 dark:text-white">Edit Instruction</h4>
                <p class="text-xs text-gray-500 dark:text-gray-400 mt-0.5">Adjust the instruction content in a focused editor.</p>
            </div>
            <div class="flex items-center space-x-4">
                <label class="inline-flex items-center cursor-pointer select-none">
                    <input type="checkbox" id="editInstructionMarkdownToggle" class="sr-only peer">
                    <div class="relative w-9 h-5 bg-gray-200 peer-focus:outline-none rounded-full peer dark:bg-gray-700 peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all dark:border-gray-600 peer-checked:bg-blue-600"></div>
                    <span class="ms-2 text-xs font-medium text-gray-700 dark:text-gray-300">Markdown Editor</span>
                </label>
                <button type="button" id="editInstructionModalCloseBtn" class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200">
                    <i class="fas fa-times text-base"></i>
                </button>
            </div>
        </div>
        <div class="px-4 py-4 flex-1 flex flex-col overflow-y-auto min-h-[400px]">
            <textarea id="editInstructionModalTextarea" class="w-full flex-1 min-h-[400px] border border-gray-300 dark:border-gray-600 dark:bg-gray-800 dark:text-white rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Enter agent instruction..."></textarea>
            <div id="editInstructionModalMonacoContainer" style="display: none;" class="w-full flex-1 min-h-[400px] border border-gray-300 dark:border-gray-600 rounded-lg overflow-hidden">
                <div id="editInstructionModalMonaco" class="w-full h-full min-h-[400px]"></div>
            </div>
        </div>
        <div class="px-4 py-3 border-t border-gray-200 dark:border-gray-700 flex justify-end space-x-2">
            <button type="button" id="editInstructionModalCancelBtn" class="px-3 py-1.5 text-xs border border-gray-300 dark:border-gray-600 rounded text-gray-600 dark:text-gray-300 hover:border-gray-400 dark:hover:border-gray-500">Cancel</button>
            <button type="button" id="editInstructionModalSaveBtn" class="px-3 py-1.5 text-xs bg-blue-600 hover:bg-blue-700 text-white rounded">Save</button>
        </div>
    </div>
</div>
