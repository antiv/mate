<!-- Widget Keys Modal -->
<div id="widgetKeysModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden z-[70]">
    <div class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-2xl w-full max-h-[85vh] overflow-hidden flex flex-col">
            <!-- Header -->
            <div class="px-4 py-3 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between flex-shrink-0">
                <div>
                    <h3 class="text-sm font-semibold text-gray-900 dark:text-white">Widget API Keys</h3>
                    <p class="text-xs text-gray-500 dark:text-gray-400 mt-0.5">Agent: <span id="widgetKeysAgentName" class="font-medium"></span></p>
                </div>
                <button onclick="hideWidgetKeysModal()" class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200">
                    <i class="fas fa-times text-lg"></i>
                </button>
            </div>

            <!-- Body -->
            <div class="p-4 overflow-y-auto flex-1">
                <!-- Existing keys list -->
                <div id="widgetKeysList" class="space-y-3 mb-4"></div>

                <!-- Generate new key form -->
                <div class="border border-dashed border-gray-300 dark:border-gray-600 rounded-lg p-4">
                    <h4 class="text-xs font-semibold text-gray-700 dark:text-gray-300 mb-3">Generate New Widget Key</h4>
                    <div class="space-y-2">
                        <div>
                            <label class="block text-xs text-gray-600 dark:text-gray-400 mb-1">Label (optional)</label>
                            <input type="text" id="widgetKeyLabel" placeholder="e.g. Production Website" class="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded px-2 py-1.5 text-xs focus:outline-none focus:ring-1 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-600 dark:text-gray-400 mb-1">Allowed Origins (comma-separated, leave blank for all)</label>
                            <input type="text" id="widgetKeyOrigins" placeholder="e.g. https://example.com, https://app.example.com" class="w-full border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded px-2 py-1.5 text-xs focus:outline-none focus:ring-1 focus:ring-blue-500">
                        </div>
                        <button onclick="generateWidgetKey()" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 text-xs rounded flex items-center">
                            <i class="fas fa-key mr-1.5"></i>
                            Generate Key
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Widget Embed Code Modal -->
<div id="widgetEmbedModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden z-[80]">
    <div class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-lg w-full">
            <div class="px-4 py-3 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
                <h3 class="text-sm font-semibold text-gray-900 dark:text-white">Embed Code</h3>
                <button onclick="document.getElementById('widgetEmbedModal').classList.add('hidden')" class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="p-4">
                <p class="text-xs text-gray-600 dark:text-gray-400 mb-2">Add this snippet to your website's HTML, just before the closing <code>&lt;/body&gt;</code> tag:</p>
                <div class="relative">
                    <pre id="widgetEmbedCode" class="bg-gray-100 dark:bg-gray-900 text-xs p-3 rounded-lg overflow-x-auto text-gray-800 dark:text-gray-200 font-mono whitespace-pre-wrap"></pre>
                    <button onclick="copyEmbedCode()" class="absolute top-2 right-2 text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200" title="Copy to clipboard">
                        <i class="fas fa-copy"></i>
                    </button>
                </div>
                <p class="text-xs text-gray-500 dark:text-gray-400 mt-3">
                    <i class="fas fa-info-circle mr-1"></i>
                    Admin panel: <a id="widgetAdminLink" href="#" target="_blank" class="text-blue-600 hover:underline">Open Admin</a>
                </p>
            </div>
        </div>
    </div>
</div>
