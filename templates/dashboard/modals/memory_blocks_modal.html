<!-- Memory Blocks Modal -->
<div id="memoryBlocksModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden z-[80]">
    <div class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-xl w-full max-w-6xl max-h-[90vh] flex flex-col">
            <!-- Modal Header -->
            <div class="px-6 py-4 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
                <h3 class="text-lg font-semibold text-gray-900 dark:text-white">Memory blocks</h3>
                <button onclick="hideMemoryBlocksModal()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <!-- Modal Body -->
            <div class="flex-1 overflow-y-auto px-6 py-4">
                <!-- Search and Filter Section -->
                <div class="mb-4 space-y-3">
                    <div class="flex items-center space-x-2 flex-wrap">
                        <button id="filterAndBtn" class="px-3 py-1.5 text-xs font-medium bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300 rounded-lg">
                            AND
                        </button>
                        <div id="filterConditions" class="flex items-center space-x-2 flex-wrap">
                            <!-- Filter conditions will be added here dynamically -->
                        </div>
                        <button onclick="addFilterCondition()" class="px-3 py-1.5 text-xs font-medium bg-blue-100 dark:bg-blue-900 text-blue-700 dark:text-blue-300 rounded-lg hover:bg-blue-200 dark:hover:bg-blue-800">
                            + Add Condition
                        </button>
                        <button onclick="searchMemoryBlocks()" class="px-4 py-1.5 text-xs font-medium bg-blue-600 text-white rounded-lg hover:bg-blue-700 flex items-center">
                            <i class="fas fa-search mr-1.5"></i>
                            Search
                        </button>
                    </div>
                </div>
                
                <!-- Create Block Button -->
                <div class="mb-4 flex justify-end">
                    <button onclick="showCreateMemoryBlockModal()" class="px-4 py-2 text-sm font-medium bg-blue-600 text-white rounded-lg hover:bg-blue-700 flex items-center">
                        <i class="fas fa-plus mr-2"></i>
                        Create block
                    </button>
                </div>
                
                <!-- Blocks List -->
                <div id="memoryBlocksList" class="space-y-3">
                    <!-- Blocks will be loaded here -->
                </div>
                
                <!-- Loading State -->
                <div id="memoryBlocksLoading" class="hidden text-center py-8">
                    <i class="fas fa-spinner fa-spin text-2xl text-gray-400"></i>
                    <p class="text-sm text-gray-500 dark:text-gray-400 mt-2">Loading memory blocks...</p>
                </div>
                
                <!-- Empty State -->
                <div id="memoryBlocksEmpty" class="hidden text-center py-8">
                    <i class="fas fa-database text-4xl text-gray-300 dark:text-gray-600"></i>
                    <p class="text-sm text-gray-500 dark:text-gray-400 mt-2">No memory blocks found</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Edit Memory Block Modal -->
<div id="editMemoryBlockModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden z-[90]">
    <div class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-xl w-full max-w-3xl max-h-[90vh] flex flex-col">
            <!-- Modal Header with Window Controls -->
            <div class="px-6 py-4 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
                <div class="flex items-center space-x-2">
                    <div class="text-gray-400 cursor-move">
                        <i class="fas fa-grip-vertical"></i>
                    </div>
                    <h3 class="text-lg font-semibold text-gray-900 dark:text-white">Edit Memory Block</h3>
                </div>
                <div class="flex items-center space-x-2">
                    <button class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                        <i class="fas fa-window-minimize"></i>
                    </button>
                    <button class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                        <i class="fas fa-window-restore"></i>
                    </button>
                    <button onclick="hideEditMemoryBlockModal()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
            
            <!-- Modal Body -->
            <div class="flex-1 overflow-y-auto px-6 py-4">
                <form id="editMemoryBlockForm" onsubmit="updateMemoryBlock(event)" class="space-y-4">
                    <input type="hidden" id="editBlockId" />
                    <input type="hidden" id="editBlockAgentName" />
                    
                    <!-- Label -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
                            Label
                        </label>
                        <div class="flex items-center space-x-2">
                            <input type="text" id="editBlockLabel" required class="flex-1 px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg dark:bg-gray-700 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500" />
                            <button type="button" onclick="deleteMemoryBlock()" class="text-red-600 hover:text-red-800 dark:text-red-400 dark:hover:text-red-300">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                    
                    <!-- Character Limit -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
                            Character Limit
                        </label>
                        <input type="number" id="editBlockLimit" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg dark:bg-gray-700 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>
                    
                    <!-- Description -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1 flex items-center">
                            Description
                            <i class="fas fa-info-circle ml-2 text-gray-400 text-xs" title="Additional information about this memory block"></i>
                        </label>
                        <textarea id="editBlockDescription" rows="3" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg dark:bg-gray-700 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                    </div>
                    
                    <!-- Value -->
                    <div>
                        <div class="flex items-center justify-between mb-1">
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">
                                Value
                            </label>
                            <span id="editBlockValueCharCount" class="text-xs text-gray-500 dark:text-gray-400">0 Chars</span>
                        </div>
                        <textarea id="editBlockValue" rows="12" required class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg dark:bg-gray-700 dark:text-white font-mono text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                    </div>
                    
                    <!-- Read-only -->
                    <div class="flex items-center">
                        <input type="checkbox" id="editBlockReadOnly" class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 dark:border-gray-600 rounded" />
                        <label for="editBlockReadOnly" class="ml-2 block text-sm text-gray-900 dark:text-gray-300 flex items-center">
                            Read-only
                            <i class="fas fa-info-circle ml-2 text-gray-400 text-xs" title="Prevent modifications to this block"></i>
                        </label>
                    </div>
                    
                    <!-- Preserve on migration -->
                    <div class="flex items-center">
                        <input type="checkbox" id="editBlockPreserveOnMigration" class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 dark:border-gray-600 rounded" />
                        <label for="editBlockPreserveOnMigration" class="ml-2 block text-sm text-gray-900 dark:text-gray-300 flex items-center">
                            Preserve on migration
                            <i class="fas fa-info-circle ml-2 text-gray-400 text-xs" title="Keep this block when migrating data"></i>
                        </label>
                    </div>
                </form>
            </div>
            
            <!-- Modal Footer -->
            <div class="px-6 py-4 border-t border-gray-200 dark:border-gray-700 flex justify-end space-x-3">
                <button type="button" onclick="hideEditMemoryBlockModal()" class="px-4 py-2 text-sm font-medium text-gray-700 dark:text-gray-300 bg-gray-200 dark:bg-gray-600 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-500">
                    Cancel
                </button>
                <button type="button" onclick="updateMemoryBlock()" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700">
                    Update
                </button>
            </div>
        </div>
    </div>
</div>

            <!-- Modal Footer -->
