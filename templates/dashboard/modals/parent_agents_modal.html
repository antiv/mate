{% macro parent_agents_modal(id_prefix) %}
<!-- Parent Agents Selection Modal -->
<div id="{{ id_prefix }}ParentAgentsModal" class="fixed inset-0 z-[120] hidden">
    <div class="absolute inset-0 bg-black/60" onclick="closeParentAgentsModal('{{ id_prefix }}')"></div>
    <div class="relative z-10 mx-auto my-6 w-full max-w-2xl px-2">
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-2xl border border-gray-200 dark:border-gray-700 flex flex-col max-h-[85vh]">
            <div class="px-4 py-3 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
                <div>
                    <h4 class="text-sm font-semibold text-gray-900 dark:text-white">Select Parent Agents</h4>
                    <p class="text-xs text-gray-500 dark:text-gray-400">Choose parent agents from the same project</p>
                </div>
                <button type="button" class="text-gray-500 dark:text-gray-300 hover:text-gray-700 dark:hover:text-gray-100" onclick="closeParentAgentsModal('{{ id_prefix }}')">
                    <i class="fas fa-times text-base"></i>
                </button>
            </div>
            <div class="px-4 py-4 overflow-y-auto space-y-2">
                <div id="{{ id_prefix }}ParentAgentsSearchContainer" class="hidden mb-3">
                    <div class="relative">
                        <input type="text" 
                               id="{{ id_prefix }}ParentAgentsSearch" 
                               placeholder="Search agents by name, type, or description..." 
                               class="w-full px-3 py-2 pl-8 text-xs border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded focus:outline-none focus:ring-1 focus:ring-blue-500"
                               oninput="filterParentAgentsList('{{ id_prefix }}')">
                        <i class="fas fa-search absolute left-2.5 top-2.5 text-gray-400 text-xs"></i>
                        <button type="button" 
                                id="{{ id_prefix }}ParentAgentsSearchClear" 
                                onclick="clearParentAgentsSearch('{{ id_prefix }}')"
                                class="absolute right-2 top-2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 hidden">
                            <i class="fas fa-times text-xs"></i>
                        </button>
                    </div>
                </div>
                <div id="{{ id_prefix }}ParentAgentsLoading" class="text-center py-4">
                    <i class="fas fa-spinner fa-spin text-gray-400"></i>
                    <p class="text-xs text-gray-500 dark:text-gray-400 mt-2">Loading agents...</p>
                </div>
                <div id="{{ id_prefix }}ParentAgentsError" class="hidden text-center py-4">
                    <p class="text-xs text-red-500 dark:text-red-400"></p>
                </div>
                <div id="{{ id_prefix }}ParentAgentsList" class="hidden space-y-2">
                    <!-- Agent checkboxes will be inserted here -->
                </div>
                <div id="{{ id_prefix }}ParentAgentsEmpty" class="hidden text-center py-4">
                    <p class="text-xs text-gray-500 dark:text-gray-400">No agents available in this project</p>
                </div>
                <div id="{{ id_prefix }}ParentAgentsNoResults" class="hidden text-center py-4">
                    <p class="text-xs text-gray-500 dark:text-gray-400">No agents match your search</p>
                </div>
            </div>
            <div class="px-4 py-3 border-t border-gray-200 dark:border-gray-700 flex justify-end space-x-2">
                <button type="button" class="px-3 py-1.5 text-xs border border-gray-300 dark:border-gray-600 rounded text-gray-600 dark:text-gray-300 hover:border-gray-400 dark:hover:border-gray-500" onclick="closeParentAgentsModal('{{ id_prefix }}')">
                    Cancel
                </button>
                <button type="button" class="px-3 py-1.5 text-xs bg-blue-600 hover:bg-blue-700 text-white rounded" onclick="applyParentAgentsSelection('{{ id_prefix }}')">
                    Apply Selection
                </button>
            </div>
        </div>
    </div>
</div>
{% endmacro %}
