<!-- Graph Editor Modal -->
<div id="graphEditorModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden z-50">
    <div class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-xl w-full max-w-7xl h-[90vh] flex flex-col">
            <!-- Header -->
            <div class="px-6 py-4 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
                <h3 class="text-lg font-semibold text-gray-900 dark:text-white">Agent Hierarchy Graph Editor</h3>
                <div class="flex space-x-2">
                    <button id="addNodeBtn" class="px-3 py-1 bg-blue-500 hover:bg-blue-600 text-white text-sm rounded">
                        <i class="fas fa-plus mr-1"></i>Add Node
                    </button>
                    <button id="saveGraphBtn" class="px-3 py-1 bg-green-500 hover:bg-green-600 text-white text-sm rounded">
                        <i class="fas fa-save mr-1"></i>Save Changes
                    </button>
                    <button id="refreshGraphBtn" class="px-3 py-1 bg-blue-500 hover:bg-blue-600 text-white text-sm rounded">
                        <i class="fas fa-sync-alt mr-1"></i>Refresh
                    </button>
                    <button onclick="hideCytoscapeGraphEditor()" class="px-3 py-1 bg-gray-500 hover:bg-gray-600 text-white text-sm rounded">
                        <i class="fas fa-times mr-1"></i>Close
                    </button>
                </div>
            </div>
            
            <!-- Toolbar -->
            <div class="px-6 py-3 border-b border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-700">
                <div class="flex items-center space-x-4">
                    <div class="flex items-center space-x-2">
                        <label class="text-sm font-medium text-gray-700 dark:text-gray-300">Layout:</label>
                        <span class="text-sm text-gray-600 dark:text-gray-400">Hierarchical</span>
                    </div>
                    <div class="flex items-center space-x-2">
                        <label class="text-sm font-medium text-gray-700 dark:text-gray-300">Zoom:</label>
                        <button id="zoomInBtn" class="px-2 py-1 bg-gray-200 dark:bg-gray-600 hover:bg-gray-300 dark:hover:bg-gray-500 text-gray-700 dark:text-gray-300 rounded text-sm">
                            <i class="fas fa-plus"></i>
                        </button>
                        <button id="zoomOutBtn" class="px-2 py-1 bg-gray-200 dark:bg-gray-600 hover:bg-gray-300 dark:hover:bg-gray-500 text-gray-700 dark:text-gray-300 rounded text-sm">
                            <i class="fas fa-minus"></i>
                        </button>
                        <button id="resetZoomBtn" class="px-2 py-1 bg-gray-200 dark:bg-gray-600 hover:bg-gray-300 dark:hover:bg-gray-500 text-gray-700 dark:text-gray-300 rounded text-sm">
                            <i class="fas fa-expand-arrows-alt"></i>
                        </button>
                    </div>
                    <div class="flex items-center space-x-2">
                        <label class="text-sm font-medium text-gray-700 dark:text-gray-300">Filter:</label>
                        <input type="text" id="graphSearchInput" placeholder="Search agents..." class="text-sm border border-gray-300 dark:border-gray-600 rounded px-2 py-1 bg-white dark:bg-gray-800 text-gray-900 dark:text-white w-48">
                    </div>
                </div>
            </div>
            
            <!-- Graph Container -->
            <div class="flex-1 relative overflow-hidden">
                <div id="graphContainer" class="w-full h-full bg-gray-50 dark:bg-gray-900">
                    <!-- Graph will be rendered here -->
                </div>
                
                <!-- Loading indicator -->
                <div id="graphLoading" class="absolute inset-0 bg-gray-50 dark:bg-gray-900 flex items-center justify-center hidden">
                    <div class="text-center">
                        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mx-auto mb-4"></div>
                        <p class="text-gray-600 dark:text-gray-400">Loading graph...</p>
                    </div>
                </div>
            </div>
            
            <!-- Status Bar -->
            <div class="px-6 py-2 border-t border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-700">
                <div class="flex justify-between items-center text-sm text-gray-600 dark:text-gray-400">
                    <div>
                        <span id="nodeCount">0</span> nodes, <span id="edgeCount">0</span> connections
                    </div>
                    <div>
                        <span id="selectedNode">No node selected</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Add Node Modal -->
<div id="addNodeModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden z-[60]">
    <div class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-md w-full">
            <div class="px-6 py-4 border-b border-gray-200 dark:border-gray-700">
                <h3 class="text-lg font-semibold text-gray-900 dark:text-white">Add New Agent</h3>
            </div>
            <div class="px-6 py-4">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Agent Name</label>
                        <input type="text" id="newAgentName" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md shadow-sm bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Agent Type</label>
                        <select id="newAgentType" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md shadow-sm bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                            <option value="llm">LLM</option>
                            <option value="sequential">Sequential</option>
                            <option value="parallel">Parallel</option>
                            <option value="loop">Loop</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Parent Agent</label>
                        <select id="newAgentParent" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md shadow-sm bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                            <option value="">No parent (root agent)</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="px-6 py-4 border-t border-gray-200 dark:border-gray-700 flex justify-end space-x-2">
                <button onclick="hideAddNodeModal()" class="px-4 py-2 bg-gray-200 dark:bg-gray-600 text-gray-700 dark:text-gray-300 rounded hover:bg-gray-300 dark:hover:bg-gray-500">
                    Cancel
                </button>
                <button id="createNewAgentBtn" class="px-4 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded">
                    Create Agent
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Connection Modal -->
<div id="connectionModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden z-[60]">
    <div class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-md w-full">
            <div class="px-6 py-4 border-b border-gray-200 dark:border-gray-700">
                <h3 class="text-lg font-semibold text-gray-900 dark:text-white">Connect Agents</h3>
            </div>
            <div class="px-6 py-4">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">From Agent</label>
                        <input type="text" id="connectionFrom" readonly class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md shadow-sm bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">To Agent</label>
                        <select id="connectionTo" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md shadow-sm bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                            <option value="">Select target agent...</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="px-6 py-4 border-t border-gray-200 dark:border-gray-700 flex justify-end space-x-2">
                <button onclick="hideConnectionModal()" class="px-4 py-2 bg-gray-200 dark:bg-gray-600 text-gray-700 dark:text-gray-300 rounded hover:bg-gray-300 dark:hover:bg-gray-500">
                    Cancel
                </button>
                <button id="createConnectionBtn" class="px-4 py-2 bg-green-500 hover:bg-green-600 text-white rounded">
                    Create Connection
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Graph Context Menu -->
<div class="graph-context-menu hidden fixed bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg shadow-lg py-1 z-[70]">
    <!-- Menu items will be dynamically added here -->
</div>
