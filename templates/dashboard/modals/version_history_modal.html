<!-- Agent Config Version History Modal -->
<div id="versionHistoryModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden z-[80]">
    <div class="flex items-stretch justify-end min-h-screen">
        <div class="bg-white dark:bg-gray-800 shadow-xl w-[900px] h-screen flex flex-col">
            <!-- Header -->
            <div class="px-4 py-2 border-b border-gray-200 dark:border-gray-700 flex-shrink-0 flex items-center justify-between">
                <div class="flex items-center space-x-2">
                    <i class="fas fa-history text-blue-500"></i>
                    <h3 class="text-sm font-semibold text-gray-900 dark:text-white">Version History</h3>
                    <span id="vhAgentName" class="text-xs text-gray-500 dark:text-gray-400"></span>
                </div>
                <button type="button" onclick="hideVersionHistoryModal()" class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 p-1" title="Close">
                    <i class="fas fa-times text-lg"></i>
                </button>
            </div>
            <!-- Body: two-pane layout -->
            <div class="flex flex-1 overflow-hidden">
                <!-- Left: version list -->
                <div class="w-[280px] border-r border-gray-200 dark:border-gray-700 flex flex-col overflow-hidden">
                    <div class="px-3 py-2 border-b border-gray-200 dark:border-gray-700 text-xs font-medium text-gray-500 dark:text-gray-400 flex items-center justify-between">
                        <span>Versions</span>
                        <span id="vhVersionCount" class="bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300 px-1.5 py-0.5 rounded-full text-[10px]">0</span>
                    </div>
                    <div id="vhVersionList" class="flex-1 overflow-y-auto"></div>
                </div>
                <!-- Right: diff viewer -->
                <div class="flex-1 flex flex-col overflow-hidden">
                    <div class="px-3 py-2 border-b border-gray-200 dark:border-gray-700 text-xs font-medium text-gray-500 dark:text-gray-400 flex items-center justify-between">
                        <span id="vhDiffTitle">Select a version to view changes</span>
                        <div id="vhDiffActions" class="hidden flex items-center space-x-1">
                            <button id="vhRollbackBtn" onclick="rollbackToVersion()" class="px-2 py-1 text-xs bg-orange-600 hover:bg-orange-700 text-white rounded flex items-center">
                                <i class="fas fa-undo mr-1"></i>Rollback
                            </button>
                        </div>
                    </div>
                    <div id="vhDiffContainer" class="flex-1 overflow-hidden"></div>
                </div>
            </div>
        </div>
    </div>
</div>
